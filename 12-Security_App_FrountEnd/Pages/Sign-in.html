<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/signin.css" rel="stylesheet">
</head>
<body>

<div class="card-wrapper">

    <!-- Header -->
    <div id="head">
        <div class="logo-icon mx-auto">
            <i class="bi bi-person-circle"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Sign in to continue to your account</p>
    </div>

    <!-- Nav tabs -->
    <div id="nav">
        <a href="Sign-in.html" class="active">Sign In</a>
        <a href="Sign-up.html">Sign Up</a>
    </div>

    <!-- Form -->
    <div class="form-card">
        <form onsubmit="return false;">

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" autocomplete="current-password">
                    <button class="btn btn-eye" type="button" onclick="togglePwd('password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Remember / Forgot -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary-save flex-grow-1" onclick="login()">Sign In</button>
                <button type="reset" class="btn btn-primary-reset" onclick="clearBadges()">Clear</button>
            </div>

            <p class="alt-note mt-3">Don't have an account? <a href="Sign-up.html">Create one →</a></p>

        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../jquery-3.7.1.min.js"></script>
<script src="../js/sign-in.js"></script>
<script>
    function togglePwd(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }

</script>
</body>
</html>

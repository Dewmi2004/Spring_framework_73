<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="../css/signup.css" rel="stylesheet">
</head>
<body>

<div class="card-wrapper">

    <!-- Header -->
    <div id="head">
        <div class="logo-icon mx-auto">
            <i class="bi bi-person-plus"></i>
        </div>
        <h1>Create Account</h1>
        <p>Join us — it only takes a minute</p>
    </div>

    <!-- Nav tabs -->
    <div id="nav">
        <a href="Sign-in.html">Sign In</a>
        <a href="Sign-up.html" class="active">Sign Up</a>
    </div>

    <!-- Form -->
    <div class="form-card">
        <form onsubmit="return false;">

            <!-- First + Last Name -->
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label" for="fname">First Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="fname" placeholder="Imasha">
                    </div>
                </div>
                <div class="col-6">
                    <label class="form-label" for="lname">Last Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="lname" placeholder="Dewmi">
                    </div>
                </div>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-at"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="Choose a username" autocomplete="username">
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="Min. 8 characters"
                           oninput="updateStrength(this.value); checkMatch()" autocomplete="new-password">
                    <button class="btn btn-eye" type="button" onclick="togglePwd('password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="strength-bar mt-2" id="strengthBar">
                    <div class="bar-seg"></div>
                    <div class="bar-seg"></div>
                    <div class="bar-seg"></div>
                    <div class="bar-seg"></div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label class="form-label" for="confirm">Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                    <input type="password" class="form-control" id="confirm" placeholder="Repeat your password"
                           oninput="checkMatch()" autocomplete="new-password">
                    <button class="btn btn-eye" type="button" onclick="togglePwd('confirm', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="match-hint" id="matchHint"></div>
            </div>

            <!-- Role -->
            <div class="mb-3">
                <label class="form-label" for="role">Role</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                    <select class="form-select" id="role" onchange="highlightBadge(this.value)">
                        <option value="">— Select a role —</option>
                        <option value="admin">Admin</option>
                        <option value="manager">User</option>

                    </select>
                </div>
                <div class="role-badges mt-2">
                    <span class="role-badge admin"   data-role="admin">Admin</span>
                    <span class="role-badge manager" data-role="manager">User</span>

                </div>
            </div>

            <!-- Terms -->
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label" for="terms">
                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                </label>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary-save flex-grow-1">Create Account</button>
                <button type="reset" class="btn btn-primary-reset" onclick="resetAll()">Clear</button>
            </div>

            <p class="alt-note mt-3">Already have an account? <a href="Sign-in.html">Sign in →</a></p>

        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
    function updateStrength(val) {
        const bar = document.getElementById('strengthBar');
        let s = 0;
        if (val.length >= 8) s++;
        if (/[A-Z]/.test(val)) s++;
        if (/[0-9]/.test(val)) s++;
        if (/[^A-Za-z0-9]/.test(val)) s++;
        bar.className = 'strength-bar' + (val.length === 0 ? '' : ' s' + s);
    }
    function checkMatch() {
        const pwd = document.getElementById('password').value;
        const cnf = document.getElementById('confirm').value;
        const hint = document.getElementById('matchHint');
        if (!cnf) { hint.textContent = ''; hint.className = 'match-hint'; return; }
        hint.textContent = pwd === cnf ? '✓ Passwords match' : '✗ Passwords do not match';
        hint.className   = 'match-hint ' + (pwd === cnf ? 'ok' : 'err');
    }
    function highlightBadge(val) {
        document.querySelectorAll('.role-badge').forEach(b =>
            b.classList.toggle('active-badge', b.dataset.role === val));
    }
    function resetAll() {
        document.getElementById('strengthBar').className = 'strength-bar';
        document.getElementById('matchHint').textContent = '';
        document.getElementById('matchHint').className = 'match-hint';
        document.querySelectorAll('.role-badge').forEach(b => b.classList.remove('active-badge'));
    }
</script>
</body>
</html>

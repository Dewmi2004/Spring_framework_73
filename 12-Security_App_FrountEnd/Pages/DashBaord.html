<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
</head>
<body>
<h1>Dashboard</h1>
<button onclick=logout()>Logout</button>
<script>
    checkaccess();
    function checkaccess() {
        let token=localStorage.getItem('token')
        if (token==null){
            window.location.href='sign-in.html'
        }
    }
    function logout() {
        localStorage.removeItem('token')
        window.location.href='sign-in.html'
    }
</script>
</body>
</html>
